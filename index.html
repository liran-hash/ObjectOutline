<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ObjectScan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: monospace; overflow: hidden; height: 100vh; }

#video  { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
#canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

#startScreen {
  position: fixed; inset: 0; z-index: 10;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
#startBtn {
  padding: 28px 70px; font-size: 22px; font-family: monospace;
  background: #00ffcc; color: #000; border: none;
  border-radius: 14px; cursor: pointer; font-weight: bold;
}
#msg { font-size: 13px; color: #0f0; }

#statusBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
  background: rgba(0,0,0,0.8); padding: 14px 16px 28px;
  display: none; flex-direction: column; gap: 10px;
}
#statusBar.show { display: flex; }

#loadMsg { font-size: 12px; color: #00ffcc; letter-spacing: 2px; text-align: center; }

#modeBtns { display: flex; gap: 8px; }
.mbtn {
  flex: 1; padding: 10px 4px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #555; font-family: monospace; font-size: 11px;
  text-align: center; cursor: pointer;
}
.mbtn .i { font-size: 18px; display: block; margin-bottom: 3px; }
.mbtn.on { border-color: #00ffcc; background: rgba(0,255,204,0.12); color: #00ffcc; }

#touchLayer { position: fixed; inset: 0; z-index: 3; display: none; touch-action: none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="touchLayer"></div>

<div id="startScreen">
  <div id="msg">Tap to begin</div>
  <button id="startBtn">▶ START</button>
</div>

<div id="statusBar">
  <div id="loadMsg">LOADING AI MODEL...</div>
  <div id="modeBtns" style="display:none">
    <div class="mbtn on" id="m-auto" onclick="setMode('auto')"><span class="i">🔍</span>Auto</div>
    <div class="mbtn"    id="m-tap"  onclick="setMode('tap')"> <span class="i">👆</span>Tap</div>
    <div class="mbtn"    id="m-draw" onclick="setMode('draw')"><span class="i">✏️</span>Draw</div>
  </div>
</div>

<script>
var video      = document.getElementById('video');
var canvas     = document.getElementById('canvas');
var touchLayer = document.getElementById('touchLayer');
var ctx        = canvas.getContext('2d');
var mode       = 'auto';
var detections = [];
var tappedBox  = null;
var isDrawing  = false;
var drawStart  = { x: 0, y: 0 };
var userBox    = null;

var PAL  = ['#00ffcc','#ff6b35','#ffdd00','#ff4dff','#88ff00','#ff4d4d','#4dffff'];
var cmap = {};
function getCol(l) { if (!cmap[l]) cmap[l] = PAL[Object.keys(cmap).length % PAL.length]; return cmap[l]; }

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ── START ──
document.getElementById('startBtn').addEventListener('click', function() {
  document.getElementById('msg').textContent = 'opening camera...';

  navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } } })
  .then(function(stream) {
    document.getElementById('msg').textContent = 'camera ok!';
    video.srcObject = stream;
    video.play().catch(function() {});

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('statusBar').classList.add('show');

    // Load TF.js
    var s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js';
    s1.onload = function() {
      document.getElementById('loadMsg').textContent = 'LOADING DETECTOR...';
      var s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js';
      s2.onload = function() {
        document.getElementById('loadMsg').textContent = 'BUILDING MODEL...';
        cocoSsd.load({ base: 'lite_mobilenet_v2' }).then(function(model) {
          window._model = model;
          document.getElementById('loadMsg').style.display = 'none';
          document.getElementById('modeBtns').style.display = 'flex';
          requestAnimationFrame(loop);
        }).catch(function(e) {
          document.getElementById('loadMsg').textContent = 'MODEL ERROR: ' + e.message;
        });
      };
      s2.onerror = function() { document.getElementById('loadMsg').textContent = 'FAILED: coco-ssd not loaded'; };
      document.head.appendChild(s2);
    };
    s1.onerror = function() { document.getElementById('loadMsg').textContent = 'FAILED: tf.js not loaded'; };
    document.head.appendChild(s1);
  })
  .catch(function(e) {
    document.getElementById('msg').textContent = 'ERROR: ' + e.name + ' — ' + e.message;
  });
});

// ── LOOP ──
function loop() {
  if (!window._model || video.readyState < 2) { requestAnimationFrame(loop); return; }
  window._model.detect(video).then(function(res) {
    detections = res || [];
    render();
    requestAnimationFrame(loop);
  }).catch(function() { requestAnimationFrame(loop); });
}

// ── RENDER ──
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var cw = canvas.width, ch = canvas.height;
  var vw = video.videoWidth || 640, vh = video.videoHeight || 480;
  var sc = Math.max(cw / vw, ch / vh);
  var ox = (cw - vw * sc) / 2, oy = (ch - vh * sc) / 2;
  function c(b) { return { x: ox+b[0]*sc, y: oy+b[1]*sc, w: b[2]*sc, h: b[3]*sc }; }

  if (mode === 'auto') {
    detections.forEach(function(d) { var r=c(d.bbox); drawBox(r.x,r.y,r.w,r.h,d.class,d.score,getCol(d.class)); });
  } else if (mode === 'tap') {
    detections.forEach(function(d) { var r=c(d.bbox); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.strokeRect(r.x,r.y,r.w,r.h); });
    if (tappedBox) drawBox(tappedBox.x,tappedBox.y,tappedBox.w,tappedBox.h,tappedBox.label,tappedBox.score,'#00ffcc');
  } else if (mode === 'draw') {
    if (userBox) {
      var best = bestOverlap(userBox);
      if (best) { var r2=c(best.bbox); drawBox(r2.x,r2.y,r2.w,r2.h,best.class,best.score,'#ff6b35'); }
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
      ctx.strokeRect(userBox.x,userBox.y,userBox.w,userBox.h); ctx.setLineDash([]);
    }
  }
}

function drawBox(x,y,w,h,label,score,col) {
  var cs=Math.min(w,h)*0.2, t=Date.now()/1000;
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.beginPath();
  ctx.moveTo(x,y+cs);ctx.lineTo(x,y);ctx.lineTo(x+cs,y);
  ctx.moveTo(x+w-cs,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y+cs);
  ctx.moveTo(x,y+h-cs);ctx.lineTo(x,y+h);ctx.lineTo(x+cs,y+h);
  ctx.moveTo(x+w-cs,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w,y+h-cs);
  ctx.stroke(); ctx.shadowBlur=0;
  var sy=y+((t*60)%h);
  var g=ctx.createLinearGradient(x,sy-8,x,sy+8);
  g.addColorStop(0,'transparent');g.addColorStop(.5,col+'40');g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(x,sy-8,w,16);
  var tag=label.toUpperCase()+(score?' '+Math.round(score*100)+'%':'');
  ctx.font='bold 11px monospace';
  var tw=ctx.measureText(tag).width, ty=y-20; if(ty<0)ty=y+3;
  ctx.fillStyle=col; ctx.fillRect(x,ty,tw+12,18);
  ctx.fillStyle='#000'; ctx.fillText(tag,x+6,ty+12);
  ctx.fillStyle=col+'0d'; ctx.fillRect(x,y,w,h);
}

// ── HIT TEST ──
function si() {
  var vw=video.videoWidth||640, vh=video.videoHeight||480;
  var sc=Math.max(canvas.width/vw,canvas.height/vh);
  return { sc:sc, ox:(canvas.width-vw*sc)/2, oy:(canvas.height-vh*sc)/2 };
}
function findAt(cx,cy) {
  var s=si(), best=null, ba=Infinity;
  detections.forEach(function(d) {
    var x=s.ox+d.bbox[0]*s.sc, y=s.oy+d.bbox[1]*s.sc, w=d.bbox[2]*s.sc, h=d.bbox[3]*s.sc;
    if (cx>=x&&cx<=x+w&&cy>=y&&cy<=y+h) { var a=w*h; if(a<ba){ba=a;best={x:x,y:y,w:w,h:h,label:d.class,score:d.score};} }
  });
  return best;
}
function bestOverlap(box) {
  var s=si(), best=null, bo=0;
  detections.forEach(function(d) {
    var dx=s.ox+d.bbox[0]*s.sc, dy=s.oy+d.bbox[1]*s.sc, dw=d.bbox[2]*s.sc, dh=d.bbox[3]*s.sc;
    var ix=Math.max(box.x,dx), iy=Math.max(box.y,dy), ix2=Math.min(box.x+box.w,dx+dw), iy2=Math.min(box.y+box.h,dy+dh);
    if(ix2>ix&&iy2>iy){var o=(ix2-ix)*(iy2-iy);if(o>bo){bo=o;best=d;}}
  });
  return best;
}

// ── TOUCH ──
touchLayer.addEventListener('touchend', function(e) {
  e.preventDefault();
  var r=touchLayer.getBoundingClientRect(), t=e.changedTouches[0];
  if (mode==='tap') tappedBox=findAt(t.clientX-r.left, t.clientY-r.top);
}, { passive: false });

touchLayer.addEventListener('touchstart', function(e) {
  if (mode!=='draw') return; e.preventDefault();
  var r=touchLayer.getBoundingClientRect(), t=e.touches[0];
  drawStart={x:t.clientX-r.left,y:t.clientY-r.top}; isDrawing=true; userBox=null;
}, { passive: false });

touchLayer.addEventListener('touchmove', function(e) {
  if (!isDrawing||mode!=='draw') return; e.preventDefault();
  var r=touchLayer.getBoundingClientRect(), t=e.touches[0];
  var cx=t.clientX-r.left, cy=t.clientY-r.top;
  userBox={x:Math.min(drawStart.x,cx),y:Math.min(drawStart.y,cy),w:Math.abs(cx-drawStart.x),h:Math.abs(cy-drawStart.y)};
}, { passive: false });

touchLayer.addEventListener('touchend', function() { if(mode==='draw') isDrawing=false; });

// ── MODE ──
function setMode(m) {
  mode=m; tappedBox=null; userBox=null; isDrawing=false;
  ['auto','tap','draw'].forEach(function(id){document.getElementById('m-'+id).classList.toggle('on',id===m);});
  touchLayer.style.display=(m==='tap'||m==='draw')?'block':'none';
}
</script>
</body>
</html>
