<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Test</title>
</head>
<body style="background:#000;color:#fff;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;margin:0;">

<div id="msg" style="font-size:14px;color:#0f0;">Tap the button</div>

<button id="btn" style="padding:30px 60px;font-size:20px;background:#0f0;color:#000;border:none;border-radius:10px;">START</button>

<video id="v" autoplay playsinline muted style="width:100%;max-width:400px;display:none;"></video>

<script>
document.getElementById('btn').addEventListener('click', function() {
  document.getElementById('msg').textContent = 'clicked...';
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(function(stream) {
    document.getElementById('msg').textContent = 'camera ok!';
    var v = document.getElementById('v');
    v.srcObject = stream;
    v.style.display = 'block';
    v.play();
  })
  .catch(function(e) {
    document.getElementById('msg').textContent = 'ERROR: ' + e.name + ' - ' + e.message;
  });
});
</script>
</body>
</html>
